<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkPass | Instant Sync</title>
    <script>
      // Safeguard against libraries trying to overwrite fetch
      (function() {
        const _fetch = window.fetch;
        try {
          Object.defineProperty(window, 'fetch', {
            configurable: true,
            enumerable: true,
            get: function() { return _fetch; },
            set: function(v) { console.warn('Prevented fetch overwrite'); }
          });
        } catch (e) {
          console.error('Could not redefine fetch:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
